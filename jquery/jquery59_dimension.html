<!DOCTYPE html>
<html>
    <head>
        <title>JQUERY 59 DIMENSION</title>
    </head>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js">
    </script>
    <script>
    // Mudah mengatur dimensi elemen HTML dan browser window 
    $(document).ready(function () {
       $("button").click(function(){
        var txt = "";
        txt += "Lebar div: " + $("#div1").width() + " px <br>";
        txt += "Tinggi div: " + $("#div1").height() + " px <br>";
        $("#div1").html(txt);
       })
    });
    </script>
    <style>
       #div1{
        height: 200px;
        width: 350px;
        padding: 10px;
        margin: 3px;
        border: 1px solid red;
        background-color: pink;
       }
    </style>
    <body>
        <h2>JQUERY 59 DIMENSION</h2>
        <div id="div1"></div>
        <br>
        <button>Tampilkan dimensi div</button>
        <p>width() - return lebar elemen</p>
        <p>height() - return tinggi elemen</p>
</html>
