<!DOCTYPE html>
<html>

        <title>JQUERY 31 ANIMATION CALLBACK</title>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js">
    </script>
    <script>
        $(document).ready(function () {
         $("button").click(function(){
            $("p").hide("slow",function(){
                alert("Callback! paragraf disembunyikan!");
            });
         });
        });
    </script>
    <style>
    </style>
    <body>
        <h2>JQUERY 31 ANIMATION CALLBACK</h2>
        <button>Hide</button>
        <p>Ini adalah paragraf ke-1</p>
    </body>
</html>
