<!DOCTYPE html>
<html>
    <head>
        <title>JQUERY 6 MOUSE ENTER</title>
    </head>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js">
    </script>
    <script>
        $(document).ready(function () {
            $("#p1").mouseenter(function () {
                alert("Kamu masuk area paragraf ke-1");
            });
        });
    </script>
    <body>
        <h2>JQUERY 6 MOUSE ENTER</h2>
        <p id="p1">Ini adalah paragraf ke-1</p>
        <p>Ini adalah paragraf ke-2</p>
    </body>
</html>
