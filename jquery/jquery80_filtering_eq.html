<!DOCTYPE html>
<html>
    <head>
        <title>JQUERY 80 FILTERING EQ</title>
    </head>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js">
    </script>
    <script>
    // Filtering digunakan untuk memilih elemen secara spesifik
    // method filtering ada first(), last(), eq(), filter() dan not()
    // method eq() digunakan untuk return elemen berdasarkan index
    $(document).ready(function () {
        $("div").eq(1).css("background-color","orange");
    });
    </script>
    <style>
        #div1, #div2, #div3{
            border: 1px solid black;
        }
    </style>
    <body>
        <h2>JQUERY 80 FILTERING EQ</h2>
        <p>Ini adalah paragraf</p>
        <div id="div1">
            <p>paragraf ke-1 didalam div 1</p>
            <p>paragraf ke-2 didalam div 1</p>
        </div>
        <div id="div2">
            <p>paragraf ke-1 didalam div 2</p>
            <p>paragraf ke-2 didalam div 2</p>
        </div>
        <div id="div3">
            <p>paragraf ke-1 didalam div 3</p>
            <p>paragraf ke-2 didalam div 3</p>
        </div>
    </body> 
</html>
