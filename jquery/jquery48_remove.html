<!DOCTYPE html>
<html>
    <head>
        <title>JQUERY 48 REMOVE ELEMENT</title>
    </head>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js">
    </script>
    <script>
    // Hapus element dengan method remove() pada element HTML yang sudah ditandai 
    $(document).ready(function () {    
        $("button").click(function(){
            $("#div1").remove();
        });
    });
    </script>
    <style>
        #div1{
            height: 100px;
            width: 300px;
            border: 1px solid black;
            background-color: yellowgreen;
        }
    </style>
    <body>
        <h2>JQUERY 48 REMOVE ELEMENT</h2>
        <div id="div1">
            <b>Ini adalah teks tebal didalam tag div1</b>
            <p>Ini adalah paragraf ke-1 didalam tag div1</p>
            <p>Ini adalah paragraf ke-2 didalam tag div1</p>
        </div>
        <br/>
        <button>Remove div1</button>
</html>
