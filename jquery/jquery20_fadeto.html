<!DOCTYPE html>
<html>
    <head>
        <title>JQUERY 20 FADE TO</title>
    </head>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js">
    </script>
    <script>
        $(document).ready(function () {
           $("button").click(function(){
            $("#div1").fadeTo("slow", 0.15); // opacity 15%
            $("#div2").fadeTo("slow", 0.4); // opacity 40%
            $("#div3").fadeTo("slow", 0.7); // opacity 70%
           });
        });
    </script>
    <body>
        <h2>JQUERY 20 FADE TO</h2>
        <p>Demonstrasi fade to, bisa mengatur opacity object</p>
        <button>Klik untuk fade to box dibawah ini</button>
        <div id="div1" style="width:80px; height: 80px; background-color: maroon;">
        </div><br/>
        <div id="div2" style="width:80px; height: 80px; background-color: cyan;">
        </div><br/>
        <div id="div3" style="width:80px; height: 80px; background-color: orange;">
        </div><br/>
    </body>
</html>
