<!DOCTYPE html>
<html>
    <head>
        <title>JQUERY 22 SLIDE UP</title>
    </head>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js">
    </script>
    <script>
        $(document).ready(function () {
          $("#flip").click(function(){
            $("#panel").slideUp("slow");
          });
        });
    </script>
    <style>
        #panel, #flip{
            padding: 50px;
            text-align: center;
            background-color: lightyellow;
            border: solid 10px green;
        }
        #panel{
            padding: 50px;
        }
    </style>
    <body>
        <h2>JQUERY 22 SLIDE UP</h2>
        <div id="flip">Klik untuk slide up panel dibawah ini.</div>
        <div id="panel">Halo Indonesia!</div>
    </body>
</html>
