<!DOCTYPE html>
<html>
    <head>
        <title>JQUERY 46 ADD ELEMENT BEFORE AFTER</title>
    </head>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js">
    </script>
    <script>
    // Add element dengan method before() sebelum element HTML yang sudah ditandai 
    // Add element dengan method after() setelah element HTML yang sudah ditandai
    $(document).ready(function () {     
        $("#btn1").click(function(){
            $("img").before("<b>Before</b>");
        });
        $("#btn2").click(function(){
            $("img").after("<b>After</b>");
        });
    });
    </script>
    <style>
    </style>
    <body>
        <h2>JQUERY 46 ADD ELEMENT BEFORE AFTER</h2>
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/9f/Flag_of_Indonesia.svg/500px-Flag_of_Indonesia.svg.png" width="100" height="140"/>
        <button id="btn1">Add before</button>
        <button id="btn2">Add after</button>
</html>
