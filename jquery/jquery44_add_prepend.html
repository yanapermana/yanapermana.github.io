<!DOCTYPE html>
<html>
    <head>
        <title>JQUERY 44 ADD ELEMENT WITH PREPEND</title>
    </head>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js">
    </script>
    <script>
    // Add element dengan manipulasi DOM (Document Object Model)
    // Menambahkan element dengan method prepend() sehingga ada element baru sebelum element yang ditandai
    $(document).ready(function () {
        $("#btn1").click(function(){
            $("#beforeThis").prepend("<p>Ini adalah paragraf baru</p>");
        });
        $("#btn2").click(function(){
            $("ol").prepend("<li>Ini adalah list item baru</li>");
        });
    });
    </script>
    <style>
    </style>
    <body>
        <h2>JQUERY 44 ADD ELEMENT WITH PREPEND</h2>
        <p id="beforeThis">Ini adalah paragraf ke-1</p>
        <p>Ini adalah paragraf ke-2</p>
        <ol>
            <li>List item ke-1</li>
            <li>List item ke-2</li>
            <li>List item ke-3</li>
        </ol>
        <button id="btn1">Prepend paragraf!</button>
        <button id="btn2">Prepend list item!</button>
    </body>
</html>
