<!DOCTYPE html>
<html>
    <head>
        <title>JQUERY 72 DESCENDANTS FIND ASTERISK</title>
    </head>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js">
    </script>
    <script>
    // Descendants adalah child, grandchild, great-grandchild dan seterusnya
    // method find() digunakan untuk return descendant elemen pada elemen HTML yang ditandai
    // warna orange menandai method find()
    // Simbol * (asterisk) digunakan untuk return descendant dari <div>
    $(document).ready(function () {
        $("div").find("*").css({
            "color":"orange",
            "border":"3px solid yellowgreen"
        });
    });
    </script>
    <style>
        #div1{
            width: 300px;
        }
        .descendants * {
            display: block;
            border: 2px solid yellowgreen;
            color: lightcoral;
            padding: 5px;
            margin: 15px;
        }
    </style>
    <body>
        <h2>JQUERY 72 DESCENDANTS FIND ASTERISK</h2>
        <div class="descendants" id="div1">div (current element)
            <p class="first">paragraph (child)
                <span>span (grandchild)</span>
            </p>
            <p class="second">paragraph (child)
                <span>span (grandchild)</span>
            </p>
        </div>
    </body> 
</html>
