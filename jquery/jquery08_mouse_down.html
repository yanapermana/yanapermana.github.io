<!DOCTYPE html>
<html>
    <head>
        <title>JQUERY 8 MOUSE DOWN</title>
    </head>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js">
    </script>
    <script>
        $(document).ready(function () {
            $("#btn1").mousedown(function () {
                // Fungsi akan dijalankan ketika mouse ditekan ke bawah di area tertentu
                alert("Mouse down ke area button ke-1");
            });
        });
    </script>
    <body>
        <h2>JQUERY 8 MOUSE DOWN</h2>
        <button id="btn1">Button 1</button>
        <button>Button 2</button>
        <button>Button 3</button>
    </body>
</html>
