<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>JQUERY 1</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js">
    </script>
    <script>
        $(document).ready(function () {
            $("p").click(function () {
                $(this).hide();
            });
        });
    </script>
</head>
<body>
    <h2>JQUERY 1</h2>
    <p>Jika kamu klik aku, aku akan menghilang</p>
    <p>Klik aku, aku akan pergi</p>
    <p>Klik aku juga ya!</p>
</body>
</html>
