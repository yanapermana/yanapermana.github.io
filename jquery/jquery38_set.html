<!DOCTYPE html>
<html>
    <head>
        <title>JQUERY 38 SET</title>
    </head>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js">
    </script>
    <script>
        // Set content dengan manipulasi DOM (Document Object Model)
        // Mengatur value dengan method text(), html(), val()
        $(document).ready(function () {
            $("#btn1").click(function(){
                $("#set1").text("Halo Konoha!");
            });
            $("#btn2").click(function(){
                $("#set2").html("<b>Aku Cinta Sawit!</b>");
            });
            $("#btn3").click(function(){
                $("#set3").val("Mr. President of Konoha!");
            });
        });
    </script>
    <style>
    </style>
    <body>
        <h2>JQUERY 38 SET</h2>
        <p id="set1">Ini adalah paragraf ke-1</p>
        <p id="set2">Ini adalah paragraf ke-2</p>
        <p>Nama Lengkap: <input type="text" id="set3" value="Yansen Permansen"/></p>
        <button id="btn1">Set Text</button>
        <button id="btn2">Set HTML</button>
        <button id="btn3">Set Val</button>
    </body>
</html>
