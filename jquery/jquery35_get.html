<!DOCTYPE html>
<html>
    <head>
        <title>JQUERY 35 GET</title>
    </head>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js">
    </script>
    <script>
        // Get content dengan manipulasi DOM (Document Object Model)
        $(document).ready(function () {
         $("#btn1").click(function(){
            alert("Text: " + $("#test").text());
         });
         $("#btn2").click(function(){
            alert("HTML: " + $("#test").html());
         });
        });
    </script>
    <style>
    </style>
    <body>
        <h2>JQUERY 35 GET</h2>
        <p id="test">Ini adalah paragraf <b>tebal</b> berisi teks.</p>
        <button id="btn1">Tampilkan teks</button>
        <button id="btn2">Tampilkan html</button>
    </body>
</html>
