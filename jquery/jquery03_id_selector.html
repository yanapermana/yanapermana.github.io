<!DOCTYPE html>
<html>
    <head>
        <title>JQUERY 3 ID SELECTOR</title>
    </head>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js">
    </script>
    <script>
        $(document).ready(function () {
            $("button").click(function () {
                $("#test").hide();
            });
        });
    </script>
    <body>
        <h2>JQUERY 3 ID SELECTOR</h2>
        <p>Ini adalah paragraf ke-1</p>
        <p id="test">Ini adalah paragraf ke-2</p>
        <button>Klik aku</button>
    </body>
</html>
