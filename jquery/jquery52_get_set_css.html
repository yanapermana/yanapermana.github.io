<!DOCTYPE html>
<html>
    <head>
        <title>JQUERY 52 GET SET CSS CLASS</title>
    </head>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js">
    </script>
    <script>
    // Modifikasi element CSS pada element HTML yang sudah ditandai 
    $(document).ready(function () {    
        $("button").click(function(){
            $("h3,h4,p").addClass("blue");
            $("div").addClass("important");
        });
    });
    </script>
    <style>
        .important{
            font-weight: bold;
            font-size: xx-large;
        }
        .blue{
            color: blue;
        }
    </style>
    <body>
        <h2>JQUERY 52 GET SET CSS CLASS</h2>
        <h3>Ini Judul 3</h3>
        <h4>Ini Judul 4</h4>
        <p>Ini adalah paragraf ke-1</p>
        <p>Ini adalah paragraf ke-2</p>
        <div>Ini adalah text penting!</div>
        <br/>
        <button>Tambah CSS class pada element</button>
</html>
