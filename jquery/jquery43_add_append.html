<!DOCTYPE html>
<html>
    <head>
        <title>JQUERY 43 ADD ELEMENT WITH APPEND</title>
    </head>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js">
    </script>
    <script>
    // Add element dengan manipulasi DOM (Document Object Model)
    // Menambahkan element dengan method append()
    $(document).ready(function () {
        $("#btn1").click(function(){
            $("#afterThis").append("<p>Ini adalah paragraf baru</p>");
        });
        $("#btn2").click(function(){
            $("ol").append("<li>Ini adalah list item baru</li>");
        });
    });
    </script>
    <style>
    </style>
    <body>
        <h2>JQUERY 43 ADD ELEMENT WITH APPEND</h2>
        <p>Ini adalah paragraf ke-1</p>
        <p id="afterThis">Ini adalah paragraf ke-2</p>
        <ol>
            <li>List item ke-1</li>
            <li>List item ke-2</li>
            <li>List item ke-3</li>
        </ol>
        <button id="btn1">Append paragraf!</button>
        <button id="btn2">Append list item!</button>
    </body>
</html>
