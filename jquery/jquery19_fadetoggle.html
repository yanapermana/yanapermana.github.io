<!DOCTYPE html>
<html>
    <head>
        <title>JQUERY 19 FADE TOGGLE</title>
    </head>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js">
    </script>
    <script>
        $(document).ready(function () {
           $("button").click(function(){
            $("#div1").fadeToggle(); // no animation
            $("#div2").fadeToggle("slow"); // slow animation
            $("#div3").fadeToggle(3000); // advanced slow animation
           });
        });
    </script>
    <body>
        <h2>JQUERY 19 FADE TOGGLE</h2>
        <p>Demonstrasi fade In/Out dengan berbagai parameter</p>
        <button>Klik untuk fade in/out box dibawah ini</button>
        <div id="div1" style="width:80px; height: 80px; background-color: maroon;">
        </div><br/>
        <div id="div2" style="width:80px; height: 80px; background-color: cyan;">
        </div><br/>
        <div id="div3" style="width:80px; height: 80px; background-color: orange;">
        </div><br/>
    </body>
</html>
