<!DOCTYPE html>
<html>
    <head>
        <title>JQUERY 68 ANCESTORS PARENTS UNTIL</title>
    </head>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js">
    </script>
    <script>
    // Ancestors terdiri dari parent, grandparent, great-grandparent dan seterusnya
    // method parentsuntil digunakan untuk return semua elemen HTML diantara dua elemen HTML
    // contohnya menandai elemen HTML diantara span dan div
    // warna orange menunjukkan elemen yang menggunakan method parentsuntil
    $(document).ready(function () {
        $("span").parentsUntil("div").css({
            "color": "orange",
            "border": "3px solid orange",
            "margin": "10px"
        });
    });
    </script>
    <style>
       #subdiv1, #subdiv2{
        width: 300px;
       }
       .ancestors * {
        display: block;
        border: 2px solid darkviolet;
        color: darkviolet;
        padding: 5px;
        margin: 15px;
       }
    </style>
    <body>
        <h2>JQUERY 68 ANCESTORS PARENTS UNTIL</h2>
       <div class="ancestors">
        <div id="subdiv1">div (great-grandparent)
            <ul>unordered list (grandparent)
                <li>list (direct parent)
                    <span>span text</span>
                </li>
            </ul>
        </div>
        <div id="subdiv2">div (grandparent)
            <p>paragraph (direct parent)
                <span>span text</span>
            </p>
        </div>
       </div> 
</html>
